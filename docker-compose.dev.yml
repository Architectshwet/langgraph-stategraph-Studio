services:
  wafer-agent-dev:
    build: .
    container_name: wafer-agent-dev
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    command: ["uv", "run", "uvicorn", "src.server:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./src:/app/src
      - ./uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - wafer-network-dev

networks:
  wafer-network-dev:
    driver: bridge
    name: wafer-dev-network
